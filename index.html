<!DOCTYPE html><html lang="de"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kremanski &mdash; Bar &amp; Cafe Berlin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#8a6d22;--gold-soft:#a4842f;--red:#9c4438;--red-soft:#b0584b;--cream:#4a4339;--muted:#736b5d;--line:rgba(74,60,40,.16)}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{color:var(--cream);font-family:'Cormorant Garamond',Georgia,serif;font-size:18px;line-height:1.6;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;z-index:-2;
  background-color:#9d978b;
  background-image:
    radial-gradient(circle at 16% 20%, rgba(221,209,184,.65) 0, rgba(221,209,184,0) 20%),
    radial-gradient(circle at 73% 28%, rgba(212,200,176,.6) 0, rgba(212,200,176,0) 22%),
    radial-gradient(circle at 38% 62%, rgba(224,212,189,.6) 0, rgba(224,212,189,0) 21%),
    radial-gradient(circle at 88% 70%, rgba(208,196,172,.55) 0, rgba(208,196,172,0) 20%),
    radial-gradient(circle at 8% 82%, rgba(218,206,182,.55) 0, rgba(218,206,182,0) 19%),
    radial-gradient(circle at 58% 92%, rgba(210,198,175,.5) 0, rgba(210,198,175,0) 22%)}
h1,h2,h3,.nav a,.btn,.eyebrow{font-family:'Oswald',sans-serif;letter-spacing:2px;text-transform:uppercase;font-weight:400}
.eyebrow{color:var(--red-soft);font-size:13px;letter-spacing:4px}
a{color:inherit;text-decoration:none}
section{padding:90px 24px;max-width:1100px;margin:0 auto}
.nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:center;gap:34px;padding:18px;background:rgba(160,153,139,.82);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.nav a{font-size:13px;color:var(--gold);transition:.25s}
.nav a:hover,.nav a.active{color:var(--red)}
.lang{position:fixed;top:14px;right:18px;z-index:60;display:flex;gap:6px}
.lang button{background:none;border:1px solid rgba(74,60,40,.35);color:var(--gold);font-family:'Oswald';font-size:11px;letter-spacing:1px;padding:5px 9px;cursor:pointer;border-radius:3px}
.lang button.on{background:var(--gold);color:#f3ecd8;border-color:var(--gold)}
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative}
.herologo{position:relative;height:62vh;max-height:600px;aspect-ratio:676/3436;transform:translateX(18%);filter:drop-shadow(0 6px 18px rgba(60,45,20,.28))}
.herologo img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}
.herologo #hmid{-webkit-mask-image:linear-gradient(to bottom,#000 -10%,transparent 0%);mask-image:linear-gradient(to bottom,#000 -10%,transparent 0%)}
.hero .tag,.hero .sub,.hero .herobtns{opacity:0;animation:fadeup .9s ease 4.3s both}
@keyframes fadeup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.hero .tag{margin-top:18px;font-size:22px;color:var(--gold);letter-spacing:1px}
.hero .sub{color:var(--red-soft);font-size:15px;letter-spacing:3px;font-family:'Oswald';text-transform:uppercase;margin-top:6px}
.herobtns{margin-top:28px;display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.center{text-align:center}
h2{font-size:34px;color:var(--red);margin:10px 0 26px;letter-spacing:5px}
.lead{font-size:21px;max-width:680px;margin:0 auto 10px;color:var(--cream)}
.divider{width:46px;height:2px;background:var(--gold);margin:22px auto}
.pagetop{padding-top:130px}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:30px}
.card{background:rgba(247,240,224,.45);border:1px solid var(--line);border-radius:10px;padding:28px}
.card h3{color:var(--red);font-size:17px;margin-bottom:8px}
.card p{color:var(--cream);font-size:17px}
.tabs{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:24px 0 34px}
.tabs button{background:none;border:1px solid rgba(74,60,40,.3);color:var(--gold);font-family:'Oswald';font-size:13px;letter-spacing:2px;text-transform:uppercase;padding:9px 18px;cursor:pointer;border-radius:30px;transition:.2s}
.tabs button.on{background:var(--gold);color:#f3ecd8;border-color:var(--gold)}
.mlist{max-width:760px;margin:0 auto}
.mcat{color:var(--red);font-family:'Oswald';letter-spacing:3px;text-transform:uppercase;font-size:14px;margin:26px 0 12px;border-bottom:1px solid var(--line);padding-bottom:6px}
.mcat:first-child{margin-top:0}
.mrow{display:block;text-align:center;padding:10px 0}
.mrow .nm{font-size:19px;display:block;color:var(--gold)}
.mrow .ds{display:block;font-size:13.5px;color:var(--muted);font-family:'Oswald';font-weight:300;letter-spacing:.5px;text-transform:none;margin:2px auto 0;max-width:520px}
.mrow .pr{display:block;font-family:'Oswald';color:var(--red-soft);white-space:nowrap;font-size:16px;margin-top:4px}
.mrow sup{font-size:10px;color:var(--red-soft);vertical-align:super}
.alleg{max-width:760px;margin:30px auto 0;border-top:1px solid var(--line);padding-top:14px;color:var(--muted);font-family:'Oswald';font-weight:300;font-size:11px;letter-spacing:.5px;line-height:1.9;text-align:center}
.snack{max-width:760px;margin:26px auto 0;background:rgba(247,240,224,.5);border:1px dashed var(--gold);border-radius:10px;padding:16px 20px;color:var(--gold);font-family:'Oswald';font-weight:300;letter-spacing:1px;font-size:15px;text-align:center}
.menucta{text-align:center;margin-top:30px}
.btn{display:inline-block;border:1px solid var(--gold);color:var(--gold);font-size:13px;padding:13px 28px;border-radius:30px;cursor:pointer;transition:.25s}
.btn:hover{background:var(--gold);color:#f3ecd8}
.happy{background:rgba(247,238,218,.55);border-top:1px solid var(--gold);border-bottom:1px solid var(--gold);max-width:none;padding:0}
.happy .inner{max-width:760px;margin:0 auto;text-align:center;padding:60px 24px}
.happy .big{font-family:'Oswald';font-weight:600;letter-spacing:6px;text-transform:uppercase;color:var(--red);font-size:30px}
.happy .price{font-size:64px;color:var(--gold);font-family:'Cormorant Garamond';font-weight:600;margin:6px 0 2px;letter-spacing:2px}
.happy .when{font-family:'Oswald';letter-spacing:3px;text-transform:uppercase;color:var(--cream);font-size:16px}
.happy .small{color:var(--muted);font-family:'Oswald';font-weight:300;letter-spacing:1px;font-size:14px;margin-top:10px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:30px}
.gitem{position:relative;aspect-ratio:4/3;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:rgba(247,240,224,.4);display:flex;align-items:center;justify-content:center;cursor:pointer}
.gitem img{width:100%;height:100%;object-fit:cover;transition:.4s}
.gitem:hover img{transform:scale(1.06)}
.gitem .ph{color:var(--muted);font-family:'Oswald';font-size:12px;letter-spacing:2px;text-transform:uppercase}
.gnote{text-align:center;color:var(--muted);font-family:'Oswald';font-size:13px;letter-spacing:1px;margin-top:18px}
.lb{position:fixed;inset:0;z-index:100;background:rgba(40,36,30,.92);display:none;align-items:center;justify-content:center}
.lb.open{display:flex}
.lb img{max-width:90vw;max-height:84vh;border-radius:8px;box-shadow:0 0 60px rgba(0,0,0,.6)}
.lb .x{position:absolute;top:22px;right:28px;color:#e6dcc4;font-size:34px;cursor:pointer;font-family:'Oswald'}
.lb .ar{position:absolute;top:50%;transform:translateY(-50%);color:#e6dcc4;font-size:46px;cursor:pointer;user-select:none;padding:0 22px;font-family:'Oswald'}
.lb .ar:hover,.lb .x:hover{color:var(--gold-soft)}
.lb .l{left:6px}.lb .r{right:6px}
.ev{display:flex;gap:22px;align-items:center;justify-content:center;background:rgba(247,240,224,.45);border:1px solid var(--line);border-left:3px solid var(--red-soft);border-radius:10px;padding:22px 24px;margin-bottom:16px}
.ev .date{font-family:'Oswald';text-align:center;min-width:64px}
.ev .date b{display:block;font-size:30px;color:var(--red)}
.ev .date span{font-size:12px;letter-spacing:2px;color:var(--muted)}
.ev .info h3{font-size:20px;letter-spacing:1px;color:var(--gold)}
.ev .info p{color:var(--muted);font-size:16px}
.evnote{text-align:center;color:var(--muted);font-family:'Oswald';font-size:13px;letter-spacing:1px;margin-top:14px}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:26px}
.cbox h3{color:var(--red);font-size:16px;margin-bottom:10px}
.hours div{display:flex;justify-content:center;gap:16px;border-bottom:1px solid var(--line);padding:6px 0;font-family:'Oswald';font-weight:300;font-size:15px;letter-spacing:1px;color:var(--gold)}
.hours div span:first-child{min-width:90px;text-align:right}
.hours div span:last-child{min-width:120px;text-align:left}
.social{margin-top:16px;display:flex;gap:14px;justify-content:center}
.social a{border:1px solid rgba(74,60,40,.3);border-radius:30px;padding:8px 18px;font-family:'Oswald';font-size:12px;letter-spacing:2px;text-transform:uppercase;transition:.2s;color:var(--gold)}
.social a:hover{background:var(--gold);color:#f3ecd8;border-color:var(--gold)}
.addr{font-family:'Oswald';font-weight:300;letter-spacing:1px;font-size:16px;color:var(--gold);line-height:1.9}
footer{text-align:center;padding:40px 20px;border-top:1px solid var(--line);color:var(--muted);font-family:'Oswald';font-size:12px;letter-spacing:2px}
footer img{height:90px;opacity:.7;margin-bottom:14px}
@media(max-width:760px){
  .cols,.cgrid{grid-template-columns:1fr}
  .grid{grid-template-columns:repeat(2,1fr)}
  .nav{gap:16px;font-size:11px;flex-wrap:wrap}
  .hero img{height:48vh}
  h2{font-size:27px}.happy .price{font-size:50px}.happy .big{font-size:24px}
  section{padding:64px 20px}.pagetop{padding-top:120px}
}
[data-de]::before{content:attr(data-de)}
body.en [data-de]::before{content:attr(data-en)}
.disco{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden;opacity:1;transition:opacity 1s ease}
.disco.gone{opacity:0}
.disco .rays{position:absolute;top:20vh;left:50%;width:1100px;height:1100px;transform:translate(-50%,-50%) scale(.4);opacity:0;
  background:repeating-conic-gradient(from 0deg, rgba(201,162,90,.20) 0deg 6deg, transparent 6deg 18deg);border-radius:50%;mix-blend-mode:screen}
.disco .cord{position:absolute;top:0;left:50%;width:2px;height:14vh;background:linear-gradient(#9a7b2e,#c9a25a);transform:translateX(-50%) translateY(-16vh)}
.disco .ball{position:absolute;top:14vh;left:50%;width:96px;height:96px;margin-left:-48px;border-radius:50%;transform:translateY(-40vh);
  background:
    repeating-linear-gradient(0deg, rgba(0,0,0,.30) 0 0.5px, transparent 0.5px 9px),
    repeating-linear-gradient(90deg, rgba(0,0,0,.30) 0 0.5px, transparent 0.5px 9px),
    radial-gradient(circle at 28% 24%, #ffffff 0 6%, #efe6cf 14%, #cdbf9a 30%, #b89b58 52%, #7d6422 80%, #4d3a12 100%);
  background-size:9px 9px, 9px 9px, 100% 100%;
  box-shadow:0 0 26px rgba(201,162,90,.55), inset -10px -10px 22px rgba(0,0,0,.5), inset 7px 7px 16px rgba(255,255,255,.4)}
.disco .ball::before{content:"";position:absolute;inset:0;border-radius:50%;
  background:repeating-conic-gradient(from 0deg at 50% 50%, rgba(255,255,255,.16) 0 4deg, rgba(0,0,0,.10) 4deg 8deg);mix-blend-mode:overlay}
.disco .ball::after{content:"";position:absolute;top:16%;left:20%;width:22%;height:16%;border-radius:50%;
  background:radial-gradient(circle,#ffffff 0,rgba(255,255,255,0) 70%);filter:blur(1px)}
</style></head><body><div class="lang"><button id="bde" class="on" onclick="setLang('de')">DE</button><button id="ben" onclick="setLang('en')">EN</button></div><nav class="nav"><a href="index.html" class="active" data-de="Start" data-en="Home"></a><a href="menu.html" data-de="Karte" data-en="Menu"></a><a href="galerie.html" data-de="Galerie" data-en="Gallery"></a><a href="events.html" data-de="Event &amp; Kontakt" data-en="Event &amp; Contact"></a></nav>

(function(){
  var mid=document.getElementById('hmid');if(!mid)return;
  var D=6400,start=null;
  function ease(e){return e<.5?4*e*e*e:1-Math.pow(-2*e+2,3)/2;}
  function step(t){if(!start)start=t;var e=(t-start)/D;if(e>1)e=1;var p=ease(e)*100;
    var g='linear-gradient(to bottom,#000 '+(p-8)+'%,transparent '+(p+1)+'%)';

    if(e<1)requestAnimationFrame(step);}
  setTimeout(function(){requestAnimationFrame(step);},500);
